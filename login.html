<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — FinomateAI</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/portal.css" />
    <script src="js/portal/config.js"></script>
  </head>

  <body class="font-sans bg-slate-50 min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <a href="index.html" class="flex items-center gap-2">
          <img src="images/logo.svg" alt="FinomateAI" width="36" height="36" />
          <span class="font-black text-slate-900 tracking-tight text-lg"
            >Finomate AI</span
          >
        </a>
        <button
          id="sign-out-btn"
          class="hidden text-sm text-slate-500 hover:text-slate-700 transition flex items-center gap-1.5"
          onclick="
            localStorage.removeItem('finomate_token');
            location.reload();
          "
        >
          <svg
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            />
          </svg>
          Sign out
        </button>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
          <div class="mb-8 text-center">
            <div
              class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-brand-50 mb-4"
            >
              <svg
                class="w-7 h-7 text-brand-600"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                />
              </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">
              Sign in to Finomate.ai
            </h1>
            <p class="mt-1 text-sm text-slate-500">
              AWS Billing Connector Portal
            </p>
          </div>

          <!-- Error message -->
          <div
            id="error-msg"
            class="hidden mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg flex items-start gap-2"
          >
            <svg
              class="w-4 h-4 text-red-500 mt-0.5 shrink-0"
              fill="currentColor"
              viewBox="0 0 20 20"
            >
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"
              />
            </svg>
            <span id="error-text" class="text-sm text-red-700"></span>
          </div>

          <form id="login-form" novalidate>
            <div class="space-y-5">
              <div>
                <label
                  for="username"
                  class="block text-sm font-medium text-slate-700 mb-1.5"
                  >Username</label
                >
                <input
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="username"
                  required
                  placeholder="Enter your username"
                  class="w-full px-4 py-2.5 rounded-lg border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition text-sm"
                />
              </div>

              <div>
                <label
                  for="password"
                  class="block text-sm font-medium text-slate-700 mb-1.5"
                  >Password</label
                >
                <div class="relative">
                  <input
                    id="password"
                    name="password"
                    type="password"
                    autocomplete="current-password"
                    required
                    placeholder="Enter your password"
                    class="w-full px-4 py-2.5 pr-11 rounded-lg border border-slate-300 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition text-sm"
                  />
                  <button
                    type="button"
                    onclick="
                      const p = document.getElementById('password');
                      const icons = this.querySelectorAll('svg');
                      p.type = p.type === 'password' ? 'text' : 'password';
                      icons[0].classList.toggle('hidden');
                      icons[1].classList.toggle('hidden');
                    "
                    class="absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 hover:text-slate-600"
                    tabindex="-1"
                    aria-label="Toggle password visibility"
                  >
                    <!-- eye icon (visible when password is hidden) -->
                    <svg
                      class="w-4 h-4"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                      />
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                      />
                    </svg>
                    <!-- eye-off icon (visible when password is shown) -->
                    <svg
                      class="w-4 h-4 hidden"
                      fill="none"
                      viewBox="0 0 24 24"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.168-3.338m3.179-2.428A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.93 3.255M15 12a3 3 0 11-6 0 3 3 0 016 0zM3 3l18 18"
                      />
                    </svg>
                  </button>
                </div>
              </div>
            </div>

            <button
              id="submit-btn"
              type="submit"
              class="mt-6 w-full flex items-center justify-center gap-2 px-6 py-3 rounded-lg bg-gradient-to-r from-brand-600 to-violet-600 text-white font-semibold text-sm hover:from-brand-700 hover:to-violet-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 transition disabled:opacity-60 disabled:cursor-not-allowed"
            >
              <span id="btn-text">Sign in</span>
              <svg
                id="btn-spinner"
                class="hidden w-4 h-4 animate-spin"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                />
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
                />
              </svg>
            </button>
          </form>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400">
          Finomate.ai — Internal Portal &middot; Authorized access only
        </p>
      </div>
    </main>

    <script src="js/portal/login.js"></script>
    <script>
      // Show sign-out button if a stale token exists (valid token redirects above)
      if (localStorage.getItem("finomate_token")) {
        document.getElementById("sign-out-btn").classList.remove("hidden");
      }
    </script>
  </body>
</html>
